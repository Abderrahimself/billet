# billet gateway — the single public origin (D3, §3.2). Routes /api/{svc}/* to the
# owning service, originates the request-id services already honor, hides /internal
# and JWKS from the edge (§3.2 rule 2), and rate-limits login (§9, mvp.md:317).
#
# Mounted read-only at /etc/nginx/conf.d/default.conf into nginxinc/nginx-unprivileged
# (non-root, listens :8080). This routing table ports 1:1 to ingress in P5 (D3).

# Preserve a client-supplied X-Request-ID for cross-tier tracing, otherwise mint
# nginx's own $request_id. Every service binds this to its log lines (logging.py).
map $http_x_request_id $req_id {
    # accept a client-supplied id only if it is safe and bounded, otherwise mint
    # our own — the id is reflected into logs and back to the caller, so an
    # unvalidated value is a log-forging / header-injection surface (M1).
    "~^[0-9A-Za-z._-]{1,128}$" $http_x_request_id;
    default                    $request_id;
}

# JSON access log → stdout, so gateway logs aggregate alongside the services'
# structlog JSON (Phase 1 observability L1, devops.md:111).
log_format json_gateway escape=json
    '{'
    '"time":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"upstream_addr":"$upstream_addr",'
    '"request_time":$request_time,'
    '"bytes_sent":$bytes_sent'
    '}';

# Edge rate limit: 5 login attempts/min/IP (§9). Exceeding it returns 429.
# Keyed on $binary_remote_addr — correct on compose. Behind the P5 ingress load
# balancer this must re-key off the real client IP (X-Forwarded-For), or every
# request looks like it comes from the LB and the limit becomes global (E1).
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_status 429;

# Static upstream resolution is fine on compose: `depends_on: service_healthy`
# means auth/catalog are up (DNS resolvable) before the gateway starts.
upstream auth_up    { server auth:8001; }
upstream catalog_up { server catalog:8002; }

server {
    listen 8080;
    server_tokens off;

    access_log /dev/stdout json_gateway;

    # forwarded context + request-id, inherited by every proxied location below
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $req_id;
    proxy_hide_header Server;                  # hide the backend's Server (uvicorn); the edge's own
                                               # Server: nginx remains — full removal is a P5 ingress concern
    proxy_hide_header X-Request-ID;            # drop the upstream's echo so we emit exactly one
    add_header X-Request-ID $req_id always;    # the gateway is the single source of the id

    # the gateway's own liveness (not proxied)
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # login is the one rate-limited path (§9); the exact match wins over /api/auth/ below
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://auth_up;
    }

    # public API surface (§6). proxy_pass has no URI part, so the full
    # /api/{svc}/... path is forwarded to the service unchanged.
    location /api/auth/ {
        proxy_pass http://auth_up;
    }
    location /api/catalog/ {
        proxy_pass http://catalog_up;
    }

    # never routed by the gateway — reachable only on the compose network (§3.2 r2).
    # 404, not 403: the edge does not even admit these paths exist (hidden topology).
    location /internal/    { return 404; }
    location /.well-known/ { return 404; }

    # the single origin also serves the SPA at / — the Next.js upstream lands later.
    location / {
        return 503;
    }
}
